<div class="cart-container">

  <h2>Your Shopping Cart</h2>

  <!-- EMPTY CART MESSAGE -->
  <div class="empty-cart" *ngIf="cartItems.length === 0">
    <p>Your cart is empty</p>
    <button (click)="continueShopping()" class="continue-btn">
      Continue Shopping
    </button>
  </div>

  <!-- CART ITEMS -->
  <div class="cart-items" *ngIf="cartItems.length > 0">

    <div
      class="cart-item"
      *ngFor="let item of cartItems"
    >

      <div class="item-image">
        <img [src]="item.image" [alt]="item.name" />
      </div>

      <div class="item-details">
        <h3>{{ item.name }}</h3>
        <p class="category">{{ item.category }} > {{ item.subcategory }}</p>
        <p class="price">₹{{ item.price }}</p>
        <p *ngIf="item.size" class="size">Size: {{ item.size }}</p>
      </div>

      <div class="item-quantity">
        <button (click)="decreaseQuantity(item)" class="qty-btn">−</button>
        <input type="number" [value]="item.quantity" readonly class="qty-input" />
        <button (click)="increaseQuantity(item)" class="qty-btn">+</button>
      </div>

      <div class="item-total">
        <p>₹{{ item.price * item.quantity }}</p>
      </div>

      <div class="item-actions">
        <button
          class="remove-btn"
          (click)="removeItem(item)"
        >
          Remove
        </button>

        <button
          class="wishlist-btn"
          (click)="moveToWishlist(item)"
        >
          Move to Wishlist
        </button>
      </div>

    </div>

  </div>

  <!-- CART SUMMARY -->
  <div class="cart-summary" *ngIf="cartItems.length > 0">
    <hr>
    <div class="summary-row">
      <span>Items:</span>
      <span>{{ totalQuantity }}</span>
    </div>
    <div class="summary-row">
      <span>Total:</span>
      <span class="total-price">₹{{ totalPrice }}</span>
    </div>
    <div class="checkout-actions">
      <button class="checkout-btn" (click)="checkout()">
        Proceed to Checkout
      </button>
      <button class="continue-btn" (click)="continueShopping()">
        Continue Shopping
      </button>
    </div>
  </div>

</div>
