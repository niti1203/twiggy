<div class="top-bar">

  <!-- LEFT SIDE -->

  <div class="left-section">

    <span class="brand">
      Twiggy
    </span>

  </div>

  <!-- RIGHT SIDE -->

  <div class="top-actions">

    <button
      class="mode-btn"
      (click)="toggleTheme()"
    >
      {{ isDarkMode ? '☀️' : '🌙' }}
    </button>

    <button class="cart-btn">
      🛒 Cart ({{ cartCount }})
    </button>

    <button
      class="logout-btn"
      (click)="logout()"
    >
      Logout
    </button>

  </div>

</div>

<!-- HERO BANNER -->

<div class="hero-banner">

  <h1>
    Deals Under ₹999
  </h1>

  <p>
    Trending products for Men, Women & Appliances
  </p>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

  <!-- SEARCH BAR -->

  <div class="search-container">

    <div class="search-input-wrapper">

      <input
        type="text"
        placeholder="Search products..."
        [(ngModel)]="searchText"
        (input)="onSearchInput($event)"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
        class="search-input"
        [class.focused]="isSearchFocused"
      />

      <div class="search-underline" [class.active]="isSearchFocused"></div>

      <div
        class="suggestions-dropdown"
        *ngIf="showSuggestions && suggestions.length > 0"
      >

        <div
          class="suggestion-item"
          *ngFor="let suggestion of suggestions"
          (click)="selectSuggestion(suggestion)"
        >

          <img
            [src]="suggestion.image"
            alt="product image"
            class="suggestion-image"
          />

          <div class="suggestion-content">

            <p class="suggestion-name">
              {{ suggestion.name }}
            </p>

            <p class="suggestion-category">
              {{ suggestion.category }}
            </p>

          </div>

          <p class="suggestion-price">
            ₹{{ suggestion.price }}
          </p>

        </div>

      </div>

    </div>

  </div>

  <!-- CATEGORY NAVIGATION -->

  <div class="category-nav">

    <button
      (click)="filterByCategory('all')"
      [class.active]="selectedCategory === 'all'"
    >
      All
    </button>

    <button
      (click)="filterByCategory('women')"
      [class.active]="selectedCategory === 'women'"
    >
      Women
    </button>

    <button
      (click)="filterByCategory('men')"
      [class.active]="selectedCategory === 'men'"
    >
      Men
    </button>

    <button
      (click)="filterByCategory('appliances')"
      [class.active]="selectedCategory === 'appliances'"
    >
      Appliances
    </button>

  </div>

  <!-- SECTION TITLE -->

  <h2 class="section-title">
    Featured Products
  </h2>

  <!-- PRODUCT GRID -->

  <div class="product-grid">

    <div
      class="product-card"
      *ngFor="let product of filteredProducts"
    >

      <!-- PRODUCT IMAGE -->

      <div class="product-image-wrapper">

        <img
          [src]="product.image"
          alt="{{ product.name }}"
          class="product-image"
        />

        <div class="product-overlay">

          <button
            class="view-btn"
            (click)="viewProduct(product.id)"
          >
            View Details
          </button>

        </div>

      </div>

      <!-- PRODUCT INFO -->

      <div class="product-info">

        <h3>
          {{ product.name }}
        </h3>

        <p class="product-category">
          {{ product.subcategory }}
        </p>

        <p class="product-price">
          ₹ {{ product.price }}
        </p>

        <!-- BUTTONS ROW -->

        <div class="product-actions">

          <!-- ADD TO CART -->

          <button
            class="cart-add-btn"
            (click)="addToCart(product)"
          >
            Add to Cart
          </button>

          <!-- WISHLIST HEART -->

          <button
            class="wishlist-btn"
            (click)="addToWishlist(product)"
          >
            ❤️
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- NO PRODUCTS MESSAGE -->

  <div
    class="no-products"
    *ngIf="filteredProducts.length === 0"
  >

    <p>No products found</p>

  </div>

</div>
